<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #faf9f6;
        --ink: #1c1c1a;
        --muted: #6b6b66;
        --line: #d8d6cf;
        --card: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 2rem 1.5rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0;
      }
      .editors {
        display: flex;
        gap: 1.5rem;
        flex-wrap: nowrap;
        justify-content: flex-start;
        max-width: 100%;
        overflow-x: auto;
        padding: 4px 4px 12px;
        scroll-snap-type: x proximity;
      }
      /* Center the row when it's narrow enough not to scroll. */
      .editors::before,
      .editors::after {
        content: "";
        margin: auto;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        min-width: 240px;
        flex: 0 0 auto;
        scroll-snap-align: start;
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }
      .card-head .title {
        font-weight: 600;
      }
      .card-head .tag {
        font-size: 12px;
        color: var(--muted);
        margin-left: 6px;
      }
      .card-head .head-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      input[type="color"] {
        width: 30px;
        height: 30px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: none;
        cursor: pointer;
      }
      .board {
        display: grid;
        gap: 3px;
        justify-content: center;
      }
      .cell {
        width: 26px;
        height: 26px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        padding: 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cell.on {
        background: currentColor;
        border-color: currentColor;
      }
      .cell.center {
        cursor: default;
        background: #2c2c2a;
        border-color: #2c2c2a;
        color: #fff;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .controls label {
        font-size: 14px;
        color: var(--muted);
      }
      button {
        font: inherit;
        font-size: 14px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        cursor: pointer;
      }
      button:hover {
        background: var(--bg);
      }
      button.primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      button.remove-board {
        padding: 2px 9px;
        font-size: 16px;
        line-height: 1;
        color: var(--muted);
      }
      button.remove-board:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      input[type="number"] {
        width: 80px;
        font: inherit;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      #status {
        font-size: 13px;
        color: var(--muted);
        min-height: 1.2em;
      }
      canvas {
        width: 80vmin;
        height: 80vmin;
        max-width: 700px;
        max-height: 700px;
        image-rendering: pixelated;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <h1>Move editor</h1>

    <div class="editors" id="editors"></div>

    <div class="controls">
      <button id="add-board">+ Add board</button>
      <label style="margin-left: 1rem">Editor radius</label>
      <input type="range" id="radius" min="2" max="5" step="1" value="3" />
      <span id="radius-out">3</span>
      <label style="margin-left: 1rem">Grid size</label>
      <input
        type="number"
        id="size"
        value="400"
        min="10"
        max="4000"
        step="10"
      />
      <button id="render" class="primary">Render</button>
      <button id="copy-link">Copy link</button>
    </div>

    <div id="status"></div>
    <canvas id="canvas"></canvas>

    <script type="module">
      import init, { generate } from "./pkg/chess_pieces.js";
      const wasm = await init();

      const KNIGHT = [
        "-2,-1",
        "-2,1",
        "-1,2",
        "1,2",
        "2,1",
        "2,-1",
        "1,-2",
        "-1,-2",
      ];

      // Default palette; boards beyond this get a generated fallback color.
      const DEFAULT_COLORS = ["#ff0000", "#0000ff", "#00aa00", "#ffaa00", "#aa00ff", "#00aaaa"];

      // A board is { color, moves: Set<string> }. The list order IS the piece
      // index that the Rust side assigns as the cell value (0, 1, 2, ...).
      const state = {
        radius: 3,
        boards: [],
      };

      const k = (dy, dx) => `${dy},${dx}`;

      function defaultColor(i) {
        if (i < DEFAULT_COLORS.length) return DEFAULT_COLORS[i];
        // Spread additional boards around the hue wheel.
        const hue = (i * 137.508) % 360;
        return hslToHex(hue, 70, 50);
      }

      function hslToHex(h, s, l) {
        s /= 100;
        l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;
        if (h < 60) [r, g, b] = [c, x, 0];
        else if (h < 120) [r, g, b] = [x, c, 0];
        else if (h < 180) [r, g, b] = [0, c, x];
        else if (h < 240) [r, g, b] = [0, x, c];
        else if (h < 300) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        const to = (v) =>
          Math.round((v + m) * 255)
            .toString(16)
            .padStart(2, "0");
        return "#" + to(r) + to(g) + to(b);
      }

      function makeBoard(color, moves) {
        return { color, moves: new Set(moves) };
      }

      // ---- URL state ----------------------------------------------------
      // Format: size ~ radius ~ board0 ~ board1 ~ ...
      // where each board is "hexcolor:move_move_move".
      function encodeState() {
        const size = +document.getElementById("size").value;
        const parts = [size, state.radius];
        for (const b of state.boards) {
          const moves = [...b.moves].join("_");
          parts.push(b.color.slice(1) + ":" + moves);
        }
        return parts.join("~");
      }

      function decodeState(str) {
        try {
          const parts = str.split("~");
          const size = +parts[0] || 400;
          const radius = Math.max(2, Math.min(5, +parts[1] || 3));
          const boards = [];
          for (let i = 2; i < parts.length; i++) {
            const [hex, moves] = parts[i].split(":");
            boards.push(
              makeBoard("#" + (hex || "ff0000"), moves ? moves.split("_") : []),
            );
          }
          if (boards.length === 0) return false;
          state.radius = radius;
          state.boards = boards;
          document.getElementById("size").value = size;
          document.getElementById("radius").value = radius;
          document.getElementById("radius-out").textContent = radius;
          return true;
        } catch {
          return false;
        }
      }

      function writeUrl() {
        history.replaceState(null, "", "#" + encodeState());
      }

      // ---- DOM ----------------------------------------------------------
      function buildAllBoards() {
        const editors = document.getElementById("editors");
        editors.innerHTML = "";
        state.boards.forEach((_, i) => editors.appendChild(buildCard(i)));
      }

      function buildCard(index) {
        const board = state.boards[index];
        const card = document.createElement("div");
        card.className = "card";

        const head = document.createElement("div");
        head.className = "card-head";

        const titleWrap = document.createElement("div");
        const title = document.createElement("span");
        title.className = "title";
        title.textContent = "Moves " + String.fromCharCode(65 + index);
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = "value " + (index + 1);
        titleWrap.append(title, tag);

        const headControls = document.createElement("div");
        headControls.className = "head-controls";

        const color = document.createElement("input");
        color.type = "color";
        color.value = board.color;
        color.oninput = () => {
          board.color = color.value;
          // Recolor just this board's cells without a full rebuild.
          card.querySelectorAll(".cell").forEach((c) => {
            if (!c.classList.contains("center")) c.style.color = board.color;
          });
          writeUrl();
        };

        const remove = document.createElement("button");
        remove.className = "remove-board";
        remove.textContent = "\u00d7"; // ×
        remove.title = "Remove board";
        remove.disabled = state.boards.length <= 1;
        remove.onclick = () => {
          state.boards.splice(index, 1);
          buildAllBoards();
          writeUrl();
        };

        headControls.append(color, remove);
        head.append(titleWrap, headControls);

        const grid = document.createElement("div");
        grid.className = "board";
        const r = state.radius;
        const n = 2 * r + 1;
        grid.style.gridTemplateColumns = `repeat(${n}, 26px)`;
        for (let dy = -r; dy <= r; dy++) {
          for (let dx = -r; dx <= r; dx++) {
            const cell = document.createElement("button");
            cell.className = "cell";
            if (dy === 0 && dx === 0) {
              cell.classList.add("center");
              cell.textContent = "X";
              cell.disabled = true;
            } else {
              cell.style.color = board.color;
              const key = k(dy, dx);
              if (board.moves.has(key)) cell.classList.add("on");
              cell.onclick = () => {
                if (board.moves.has(key)) board.moves.delete(key);
                else board.moves.add(key);
                cell.classList.toggle("on");
                writeUrl();
              };
            }
            grid.appendChild(cell);
          }
        }

        card.append(head, grid);
        return card;
      }

      // ---- generate -----------------------------------------------------
      // Concatenate every board's (dy, dx) pairs into one flat Int32Array,
      // and record how many ints each board contributed (2 per move).
      function buildFlatAndLengths() {
        const flat = [];
        const lengths = [];
        for (const b of state.boards) {
          let count = 0;
          for (const s of b.moves) {
            const [dy, dx] = s.split(",").map(Number);
            flat.push(dy, dx);
            count += 2;
          }
          lengths.push(count);
        }
        return {
          flat: new Int32Array(flat),
          lengths: new Uint32Array(lengths),
        };
      }

      function hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
      }

      function render() {
        const status = document.getElementById("status");
        const size = Math.max(
          10,
          Math.min(4000, +document.getElementById("size").value),
        );
        const { flat, lengths } = buildFlatAndLengths();
        const colors = state.boards.map((b) => hexToRgb(b.color));

        status.textContent = `Generating ${size}×${size}…`;

        requestAnimationFrame(() => {
          const t0 = performance.now();
          const result = generate(size, flat, lengths);
          const w = size,
            h = size;

          const cells = new Int32Array(
            wasm.memory.buffer,
            result.data_ptr(),
            result.data_len(),
          );

          const white = [255, 255, 255];
          const rgba = new Uint8ClampedArray(w * h * 4);
          for (let i = 0; i < cells.length; i++) {
            const v = cells[i];
            const c = v >= 0 && v < colors.length ? colors[v] : white;
            const j = i * 4;
            rgba[j] = c[0];
            rgba[j + 1] = c[1];
            rgba[j + 2] = c[2];
            rgba[j + 3] = 255;
          }

          const canvas = document.getElementById("canvas");
          canvas.width = w;
          canvas.height = h;
          canvas.getContext("2d").putImageData(new ImageData(rgba, w, h), 0, 0);

          status.textContent = `Done: ${size}×${size} in ${(performance.now() - t0).toFixed(0)} ms`;
        });
      }

      // ---- wiring -------------------------------------------------------
      document.getElementById("radius").oninput = (e) => {
        state.radius = +e.target.value;
        document.getElementById("radius-out").textContent = state.radius;
        buildAllBoards();
        writeUrl();
      };
      document.getElementById("add-board").onclick = () => {
        const i = state.boards.length;
        state.boards.push(makeBoard(defaultColor(i), KNIGHT));
        buildAllBoards();
        writeUrl();
      };
      const sizeInput = document.getElementById("size");
      sizeInput.oninput = writeUrl;
      sizeInput.onkeydown = (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          render();
        }
      };
      document.getElementById("render").onclick = render;

      document.getElementById("copy-link").onclick = async () => {
        writeUrl();
        try {
          await navigator.clipboard.writeText(window.location.href);
          const btn = document.getElementById("copy-link");
          const old = btn.textContent;
          btn.textContent = "Copied!";
          setTimeout(() => (btn.textContent = old), 1200);
        } catch {
          window.prompt("Copy this link:", window.location.href);
        }
      };

      // ---- init ---------------------------------------------------------
      let loaded = false;
      if (window.location.hash.length > 1) {
        loaded = decodeState(decodeURIComponent(window.location.hash.slice(1)));
      }
      if (!loaded) {
        // Default: two boards, both seeded with the knight moves.
        state.boards = [
          makeBoard(defaultColor(0), KNIGHT),
          makeBoard(defaultColor(1), KNIGHT),
        ];
      }
      buildAllBoards();
      writeUrl();
      render();
    </script>
  </body>
</html>
